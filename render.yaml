# TaleTalk — Render.com deployment
# Backend (FastAPI): set rootDirectory to backend so build/start run from there.
services:
  - type: web
    name: taletalk-api
    rootDirectory: backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind=0.0.0.0:$PORT --reuse-port -k uvicorn.workers.UvicornWorker main:app
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
